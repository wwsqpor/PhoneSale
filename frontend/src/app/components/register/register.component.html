<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">📱 PhoneShop</div>
    <h1>Create account</h1>
    <p class="auth-sub">Join us to start shopping</p>

    @if (error) { <div class="alert-error">{{ error }}</div> }

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" placeholder="Choose a username" class="form-input">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="your@email.com" class="form-input">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="At least 6 characters" class="form-input">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input [(ngModel)]="password2" type="password" placeholder="Repeat password" class="form-input" (keyup.enter)="onRegister()">
    </div>
    <button (click)="onRegister()" class="btn-auth" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Create Account' }}
    </button>
    <p class="auth-switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
