<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/home" class="nav-brand">
      <span class="brand-icon">📱</span>
      <span class="brand-text">PhoneShop</span>
    </a>
    <div class="nav-links">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a>
      <a routerLink="/phones" routerLinkActive="active" class="nav-link">Phones</a>
      @if (currentUser) {
        <a routerLink="/cart" routerLinkActive="active" class="nav-link cart-link">
          Cart
          @if (cartCount > 0) {
            <span class="cart-badge">{{ cartCount }}</span>
          }
        </a>
        <a routerLink="/orders" routerLinkActive="active" class="nav-link">Orders</a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">{{ currentUser.username }}</a>
        <button (click)="logout()" class="btn-logout">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
        <a routerLink="/register" class="btn-register">Sign Up</a>
      }
    </div>
  </div>
</nav>
