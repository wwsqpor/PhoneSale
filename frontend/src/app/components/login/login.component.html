<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">📱 PhoneShop</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your account</p>

    @if (error) { <div class="alert-error">{{ error }}</div> }

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" placeholder="Enter username" class="form-input" (keyup.enter)="onLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter password" class="form-input" (keyup.enter)="onLogin()">
    </div>
    <button (click)="onLogin()" class="btn-auth" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
    <p class="auth-switch">Don't have an account? <a routerLink="/register">Sign up</a></p>
    <div class="demo-creds">
      <p>Demo: <code>testuser / test123</code> or <code>admin / admin123</code></p>
    </div>
  </div>
</div>
