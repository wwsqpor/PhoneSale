<div class="support-page">
  <h2>Support Center</h2>
  <p class="subtitle">We usually respond within 24 hours</p>

  <div class="support-card">
    <div class="field">
      <label>Your Name</label>
      <input [(ngModel)]="name" placeholder="John Doe" />
    </div>
    <div class="field">
      <label>Email</label>
      <input [(ngModel)]="email" placeholder="you@example.com" type="email" />
    </div>
    <div class="field">
      <label>Message</label>
      <textarea [(ngModel)]="message" placeholder="Describe your issue..."></textarea>
    </div>
    <button (click)="send()">Send Message →</button>
  </div>
</div>
