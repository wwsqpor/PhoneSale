<div class="detail">
  <div class="detail-grid" *ngIf="phone">
    <div class="detail-img-wrap">
      <img [src]="phone.image" [alt]="phone.name" />
    </div>

    <div class="detail-info">
      <h2>{{ phone.name }}</h2>
      <div class="detail-price">{{ phone.price }}$</div>

      <div class="specs">
        <div class="spec-row">
          <span class="spec-label">📅 Year</span>
          <span class="spec-value">{{ phone.year }}</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">💾 Memory</span>
          <span class="spec-value">{{ phone.memory }}</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">📷 Camera</span>
          <span class="spec-value">{{ phone.camera }}</span>
        </div>
        <div class="spec-row">
          <span class="spec-label">🔋 Battery</span>
          <span class="spec-value">{{ phone.battery }}</span>
        </div>
      </div>

      <div class="detail-actions">
        <button (click)="like()" class="like-btn">
          {{ phone.liked ? '❤️ Liked' : '🤍 Like' }}
        </button>
        <button (click)="addToCart()" class="cart-add-btn">🛒 Add to Cart</button>
        <button (click)="buyNow()" class="buy-btn">⚡ Buy Now</button>
        <button routerLink="/cart" class="go-cart-btn">🛍 Go to Cart</button>
      </div>
    </div>
  </div>

  <div class="notification" *ngIf="showNotification">{{ message }}</div>
</div>
