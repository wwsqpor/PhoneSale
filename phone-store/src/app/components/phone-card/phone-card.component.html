<div class="card">
  <div class="card-img-wrap" (click)="open()">
    <img [src]="phone.image" [alt]="phone.name" />
  </div>

  <h3>{{ phone.name }}</h3>
  <div class="card-price">
    {{ phone.price }}<span>$</span>
  </div>

  <div class="actions">
    <button (click)="like()">{{ phone.liked ? '❤️' : '🤍' }}</button>
    <button (click)="addToCart()">🛒</button>
    <button (click)="buyNow()" class="buy-now">⚡ Buy</button>
  </div>

  <div class="notification" *ngIf="showNotification">{{ message }}</div>
</div>
